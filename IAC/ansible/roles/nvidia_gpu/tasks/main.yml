---
# ansible/roles/nvidia_gpu/tasks/main.yml
#
# Migration from 2-install-docker-nvidia.sh to idempotent Ansible tasks.
# Target: Ubuntu 22.04 ARM64 (g5g = Graviton2 + T4G GPU)

# ── 1. Host driver check ───────────────────────────────────────────────────

- name: Verify that the NVIDIA driver is present on the host
  command: nvidia-smi
  register: nvidia_smi_check
  changed_when: false
  failed_when: nvidia_smi_check.rc != 0
  # ⚠️  If this fails here: the AMI does not have a preinstalled driver.
  #    On g5g, use the Deep Learning Base AMI or install the driver first.

- name: Show NVIDIA driver version
  debug:
    msg: "{{ nvidia_smi_check.stdout_lines[0] }}"

# ── 2. System prerequisites ────────────────────────────────────────────────

- name: Install apt prerequisites
  apt:
    name:
      - curl
      - gnupg
      - ca-certificates
    state: present
    update_cache: true

# ── 3. NVIDIA Container Toolkit GPG key ──────────────────────────────────

- name: Create the keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download the NVIDIA Container Toolkit GPG key
  shell: |
    curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
    gpg --dearmor -o /etc/apt/keyrings/nvidia-container-toolkit.gpg
  args:
    creates: /etc/apt/keyrings/nvidia-container-toolkit.gpg
  # creates= makes the task idempotent (does not re-download if already present)

# ── 4. NVIDIA repository ─────────────────────────────────────────────────

- name: Get the OS distribution
  shell: ". /etc/os-release && echo $ID$VERSION_ID"
  register: os_distribution
  changed_when: false

- name: Add the NVIDIA Container Toolkit repository
  shell: |
    curl -s -L \
      https://nvidia.github.io/libnvidia-container/{{ os_distribution.stdout }}/libnvidia-container.list | \
    sed 's#deb https://#deb [signed-by=/etc/apt/keyrings/nvidia-container-toolkit.gpg] https://#g' | \
    tee /etc/apt/sources.list.d/nvidia-container-toolkit.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

# ── 5. Install NVIDIA Container Toolkit ───────────────────────────────────

- name: Install nvidia-container-toolkit
  apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: true

# ── 6. Configure the Docker runtime ───────────────────────────────────────

- name: Check whether the NVIDIA runtime is already configured in Docker
  shell: docker info --format '{{ "{{" }}.Runtimes{{ "}}" }}' 2>/dev/null | grep -q nvidia
  register: nvidia_runtime_check
  changed_when: false
  failed_when: false

- name: Configure Docker to use the NVIDIA runtime
  command: nvidia-ctk runtime configure --runtime=docker
  when: nvidia_runtime_check.rc != 0
  notify: Restart Docker

- name: Flush handlers (restart Docker if necessary)
  meta: flush_handlers

# ── 7. Final verification ─────────────────────────────────────────────────

- name: Ensure Docker is running
  systemd:
    name: docker
    state: started
    enabled: true