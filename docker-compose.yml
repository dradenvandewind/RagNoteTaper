services:
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]

  #   volumes:
  #     - ollama_data:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   restart: unless-stopped
  #   entrypoint: ["/bin/sh", "-c"]
  #   command:
  #     - "ollama serve & sleep 3 && ollama pull ${QWEN_MODEL:-qwen2.5:3b} && wait"
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped

    environment:
      OLLAMA_NUM_CTX: 
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_KEEP_ALIVE: "5m"

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama


    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

    # Uncomment for NVIDIA GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ──────────────────────────────────────────────
  # Pull models once
  # ──────────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    restart: "no"

    environment:
      OLLAMA_HOST: http://ollama:11434

    depends_on:
      ollama:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "⏳ Waiting for Ollama..."
        until ollama list >/dev/null 2>&1; do
          sleep 3
        done

        echo "📥 Pulling qwen2.5:3b (traduction)..."
        ollama pull qwen2.5:3b

        echo "✅ Models ready."




  rag-api:
    build: ./backend
    container_name: rag-llamaindex
    labels:
      collect_logs: "true" 
    logging:
      driver: "json-file"
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    environment:
      - OLLAMA_URL=http://ollama:11434
      - QWEN_MODEL=${QWEN_MODEL:-qwen2.5:3b}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - SOURCE_LANG=${SOURCE_LANG:-fr}
    depends_on:
      - ollama
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  # L'agent de collecte
  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      # Permet à Promtail de lire les logs des conteneurs de la machine
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning//datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - loki

  nginx:
    image: nginx:alpine
    container_name: transcript-nginx
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rag-api
    restart: unless-stopped

volumes:
  ollama_data:
  grafana-data:
