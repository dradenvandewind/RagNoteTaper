<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Console — Live Transcription &amp; Translation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="console">
<header class="console__header">
<div class="brand">
<span class="brand__mark">◉</span>
<div class="brand__text">
<h1>Transcription Console</h1>
<p>Whisper &rarr; Qwen &middot; FR &rarr; EN &middot; real-time</p>
</div>
</div>
<div class="status" id="status-badge">
<span class="status__dot" id="status-dot"></span>
<span id="status-text">Stopped</span>
</div>
</header>

<section class="deck">
<div class="deck__meter">
<canvas id="meter" width="800" height="48"></canvas>
</div>
<div class="deck__controls">
  <button id="start-btn" class="btn btn--start">Start listening</button>
  <button id="stop-btn" class="btn btn--stop" disabled>Stop</button>
  
  <button id="btn-resume" class="btn" style="background: #4fd1c5; color: #0b0d10;" onclick="lancerResume()">📋 Résumer la discussion</button>
  
  <span class="deck__hint">5s chunks &middot; browser mic capture</span>
</div>
<div id="container-resume" style="display: none; margin-top: 15px; padding: 15px; background-color: var(--panel); border: 1px solid var(--panel-line); border-left: 4px solid var(--fr); border-radius: 10px;">
    <h4 style="margin-top: 0; font-family: var(--font-display); color: var(--fr);">Résume :</h4>
    <p id="affichage-resume" style="white-space: pre-line; font-size: 14px; color: var(--ink); margin: 0;"></p>
</div>
</section>

<section class="channels">
<article class="channel channel--fr">
<header class="channel__header">
<span class="channel__tag">FR</span>
<h2>Transcription</h2>
</header>
<div class="channel__body" id="transcript"></div>
</article>

<article class="channel channel--en">
<header class="channel__header">
<span class="channel__tag">EN</span>
<h2>Translation</h2>
</header>
<div class="channel__body" id="translation"></div>
</article>
</section>
</div>

<script src="app.js"></script>
</body>
</html>
