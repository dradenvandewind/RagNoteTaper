server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock # Optionnel si exécuté localement, mais ici on passe par le système de fichiers :
    static_configs:
      - targets: [localhost]
        labels:
          job: containerlogs
          __path__: /var/lib/docker/containers/*/*-json.log 

    # Pipeline to extract and filter the container name
    relabel_configs:
      - source_labels: [__address__]
        target_label: container_name