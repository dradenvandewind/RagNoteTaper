server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock # Communicates with the Docker API
        refresh_interval: 5s
    relabel_configs:
      # Extracts the Docker container name and converts it into a Grafana label
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container_name